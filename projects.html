<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Проєкт — Central Architects</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #121212; color: #e0e0e0; padding-top: 60px; }
        .site-header { position: fixed; top: 0; left: 0; width: 100%; height: 60px; background-color: rgba(18, 18, 18, 0.95); z-index: 1000; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .main-nav { display: flex; gap: 35px; }
        .main-nav a { color: #ffffff; text-decoration: none; font-size: 14px; font-weight: 500; text-transform: uppercase; }
        .project-title-header { text-align: center; padding: 30px 20px 10px; }
        .project-container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .project-gallery { display: flex; flex-direction: column; gap: 25px; align-items: center; }
        .project-gallery img { width: 100%; max-width: 1200px; height: auto; border-radius: 8px; box-shadow: 0 6px 20px rgba(0, 0, 0, 0.6); }
    </style>
</head>
<body>

    <header class="site-header">
        <nav class="main-nav">
            <a href="index.html">Головна</a>
            <a href="categories.html">Наші проекти</a>
        </nav>
    </header>

    <div class="project-title-header">
        <h1 id="project-title">Завантаження...</h1>
    </div>

    <section class="project-container">
        <div class="project-gallery" id="project-gallery"></div>
    </section>

    <script>
        const extensions = ['.jpg', '.JPG', '.png', '.PNG', '.webp', '.WEBP', '.jpeg', '.JPEG'];

        function loadProjectGallery(container, basePath, num) {
            const formattedIndex = String(num).padStart(3, '0');
            let extIndex = 0;

            function attemptNextExtension() {
                if (extIndex >= extensions.length) return;

                const currentUrl = `${basePath}/image_${formattedIndex}${extensions[extIndex]}`;
                const img = new Image();

                img.onload = () => {
                    container.appendChild(img);
                    loadProjectGallery(container, basePath, num + 1);
                };

                img.onerror = () => {
                    extIndex++;
                    attemptNextExtension();
                };

                img.src = currentUrl;
            }

            attemptNextExtension();
        }

        document.addEventListener("DOMContentLoaded", async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const categoryType = urlParams.get('type');
            const projectId = urlParams.get('id');
            const titleEl = document.getElementById('project-title');

            try {
                const response = await fetch('./projects.json');
                const data = await response.json();
                const projects = data[categoryType] || [];
                const currentProject = projects.find(p => p.id === projectId);

                if (currentProject) {
                    titleEl.textContent = currentProject.title;
                    const gallery = document.getElementById('project-gallery');
                    loadProjectGallery(gallery, currentProject.folder, 1);
                } else {
                    titleEl.textContent = "Проєкт не знайдено";
                }
            } catch (err) {
                titleEl.textContent = "Помилка завантаження";
            }
        });
    </script>
</body>
</html>
